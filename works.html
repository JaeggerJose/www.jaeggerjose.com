  <style>
    /* ── Works page: dark chrome ── */
    body { background: #07101e; }
    #nav {
      background: rgba(7, 16, 30, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom-color: rgba(100, 150, 220, 0.12);
    }

    /* ── Works page map ── */
    .works-wrap {
      position: relative;
      width: 100%;
      height: calc(100svh - 90px);
      margin-top: 90px;
      overflow: hidden;
      background: #07101e;
    }
    #map-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .works-title {
      position: absolute;
      top: 1.6rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }
    .works-title .label {
      font-family: var(--font-pixel);
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      color: rgba(180, 200, 240, 0.55);
    }
    .works-title h1 {
      font-family: var(--font-pixel);
      font-size: clamp(0.7rem, 2vw, 1rem);
      letter-spacing: 0.2em;
      color: #dce8ff;
      margin-top: 0.4rem;
      text-shadow: 0 0 20px rgba(100, 160, 255, 0.4);
    }
    .works-hint {
      position: absolute;
      bottom: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-pixel);
      font-size: 0.5rem;
      letter-spacing: 0.25em;
      color: rgba(180, 210, 255, 0.35);
      z-index: 10;
      pointer-events: none;
      animation: hint-pulse 3s ease-in-out infinite;
    }
    @keyframes hint-pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    /* ── Map Pins ── */
    #map-pins {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
    }
    .map-pin {
      position: absolute;
      transform: translate(-50%, -50%);
      background: none;
      border: none;
      padding: 8px;
      cursor: pointer;
      pointer-events: all;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: none;
    }
    .pin-glow {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 0;
      background: var(--pin-color, #fff);
      opacity: 0;
      animation: pin-pulse 2.8s ease-in-out infinite;
      filter: blur(6px);
    }
    .pin-core {
      width: 8px;
      height: 8px;
      display: block;
      position: relative;
      z-index: 1;
      image-rendering: pixelated;
      transition: transform 0.15s;
    }
    .pin-lbl {
      display: block;
      font-family: var(--font-pixel);
      font-size: 0.42rem;
      letter-spacing: 0.08em;
      white-space: nowrap;
      background: rgba(4, 10, 28, 0.82);
      padding: 2px 6px;
      border-left: 2px solid currentColor;
      opacity: 0;
      transform: translateY(3px);
      transition: opacity 0.2s, transform 0.2s;
      position: relative;
      z-index: 1;
      pointer-events: none;
      margin-top: 4px;
    }
    .map-pin:hover .pin-lbl,
    .map-pin:focus .pin-lbl {
      opacity: 1;
      transform: translateY(0);
    }
    .map-pin:hover .pin-core,
    .map-pin:focus .pin-core {
      transform: scale(1.6);
    }
    .map-pin:hover .pin-glow,
    .map-pin:focus .pin-glow {
      opacity: 0.35;
    }
    @keyframes pin-pulse {
      0%, 100% { opacity: 0.12; transform: scale(1); }
      50%       { opacity: 0.28; transform: scale(1.4); }
    }
    @media (hover: none) {
      .map-pin { cursor: auto; }
      .pin-lbl { opacity: 0.95; transform: translateY(0); }
    }

    /* ── Project Panel ── */
    .map-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 8, 20, 0.5);
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .map-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .project-panel {
      position: fixed;
      top: 0;
      right: -440px;
      width: min(420px, 100vw);
      height: 100dvh;
      background: rgba(6, 12, 28, 0.97);
      backdrop-filter: blur(16px);
      border-left: 1px solid rgba(120, 160, 230, 0.14);
      z-index: 90;
      padding: 120px 32px 40px;
      overflow-y: auto;
      transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      scrollbar-width: thin;
      scrollbar-color: rgba(80, 120, 200, 0.25) transparent;
    }
    .project-panel.open { right: 0; }
    .panel-close {
      position: absolute;
      top: 96px;
      right: 24px;
      background: none;
      border: 1px solid rgba(120, 160, 230, 0.2);
      color: rgba(180, 210, 255, 0.6);
      font-family: var(--font-pixel);
      font-size: 0.6rem;
      padding: 0.5rem 0.75rem;
      cursor: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .panel-close:hover { border-color: rgba(120, 160, 230, 0.5); color: #dce8ff; }
    .panel-biome {
      font-family: var(--font-pixel);
      font-size: 0.48rem;
      letter-spacing: 0.35em;
      color: rgba(100, 160, 220, 0.55);
      margin-bottom: 0.6rem;
    }
    .panel-year {
      font-family: var(--font-pixel);
      font-size: 0.55rem;
      color: rgba(180, 210, 255, 0.45);
      letter-spacing: 0.2em;
      margin-bottom: 1rem;
    }
    .panel-title {
      font-family: var(--font-serif);
      font-size: clamp(1.3rem, 4vw, 1.7rem);
      font-weight: 700;
      color: #dce8ff;
      line-height: 1.25;
      margin-bottom: 0.5rem;
    }
    .panel-sub {
      font-family: var(--font-pixel);
      font-size: 0.52rem;
      letter-spacing: 0.15em;
      color: rgba(140, 180, 240, 0.65);
      margin-bottom: 1.5rem;
    }
    .panel-desc {
      font-family: var(--font-sans);
      font-size: 0.9rem;
      line-height: 1.75;
      color: rgba(190, 210, 245, 0.8);
      margin-bottom: 1.6rem;
    }
    .panel-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .project-panel .chip {
      background: rgba(30, 50, 100, 0.6);
      border: 1px solid rgba(80, 120, 200, 0.25);
      color: rgba(160, 200, 255, 0.85);
      font-size: 0.72rem;
      padding: 0.3rem 0.7rem;
    }
    .panel-gh {
      display: inline-block;
      font-family: var(--font-pixel);
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: rgba(140, 180, 240, 0.7);
      border-bottom: 1px solid rgba(120, 160, 220, 0.3);
      padding-bottom: 2px;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }
    .panel-gh:hover { color: #90c8f8; border-color: rgba(140, 200, 255, 0.6); }
    .panel-accent {
      height: 3px;
      border-radius: 0;
      margin-bottom: 1.4rem;
      margin-left: -32px;
      margin-right: -32px;
    }

    /* light mode — keep map always dark, just adjust panel */
    html[data-theme="light"] .project-panel { background: rgba(6, 12, 28, 0.97); }
  </style>
