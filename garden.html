  <main class="garden-main" id="garden-main">
    <section class="garden-hero">
      <h1 class="garden-title">GARDEN</h1>
      <p class="garden-subtitle">a place where i keep things</p>
    </section>
    <section class="garden-channels" id="channels-list" aria-busy="true">
      <p class="garden-empty">loading…</p>
    </section>
  </main>

  <div class="auth-bar" id="auth-bar" style="display:none;">
    <span id="auth-user"></span>
    <button id="new-channel-btn">+ NEW CHANNEL</button>
    <button id="signout-btn">SIGN OUT</button>
  </div>
  <button class="auth-trigger" id="auth-trigger" aria-label="admin login">·</button>

  <dialog id="channel-modal" class="garden-modal">
    <form method="dialog" id="channel-form">
      <h2>New Channel</h2>
      <label>Title <input name="title" required></label>
      <label>Slug  <input name="slug" required pattern="[a-z0-9-]+"></label>
      <label>Summary <textarea name="summary" rows="3"></textarea></label>
      <label>Visibility
        <select name="visibility">
          <option value="public" selected>Public</option>
          <option value="private">Private</option>
        </select>
      </label>
      <label>Position <input name="position" type="number" value="0"></label>
      <div class="garden-modal-actions">
        <button value="cancel" type="reset">Cancel</button>
        <button value="confirm" type="submit">Create</button>
      </div>
    </form>
  </dialog>

  <dialog id="login-modal" class="garden-modal">
    <form method="dialog" id="login-form">
      <h2>Admin Login</h2>
      <label>Email <input name="email" type="email" required></label>
      <label>Password <input name="password" type="password" required></label>
      <div class="garden-modal-actions">
        <button value="cancel" type="reset">Cancel</button>
        <button value="confirm" type="submit">Sign in</button>
      </div>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
